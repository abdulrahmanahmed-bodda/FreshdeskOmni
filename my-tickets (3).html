<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bosta — My Tickets</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #E30613; --red-dark: #a80000; --red-light: #fff0f0;
      --red-border: #ffcccc; --text: #1a1a2e; --muted: #6b7280;
      --bg: #f9fafb; --white: #ffffff; --border: #e5e7eb;
    }
    body { font-family: "DM Sans", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* HEADER */
    .page-header {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: "Syne", sans-serif; font-weight: 800; font-size: 1.3rem; color: var(--red); }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    .customer-email-badge {
      background: var(--red-light); border: 1px solid var(--red-border);
      color: var(--red); border-radius: 20px; padding: 0.3rem 0.85rem;
      font-size: 0.78rem; font-weight: 600; display: none;
    }
    .btn-logout {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 0.4rem 0.85rem; font-size: 0.8rem;
      cursor: pointer; font-family: "DM Sans", sans-serif; display: none;
    }
    .btn-logout:hover { border-color: var(--red); color: var(--red); }

    /* CONTAINER */
    .container { max-width: 800px; margin: 2.5rem auto; padding: 0 1.5rem 4rem; }

    /* EMAIL LOOKUP */
    #email-lookup { text-align: center; padding: 3rem 2rem; }
    #email-lookup h2 { font-family: "Syne", sans-serif; font-weight: 800; font-size: 1.8rem; margin-bottom: 0.5rem; }
    #email-lookup p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .lookup-box {
      background: var(--white); border-radius: 16px; border: 1px solid var(--border);
      padding: 2rem; max-width: 420px; margin: 0 auto;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .lookup-box label { font-size: 0.8rem; font-weight: 600; display: block; margin-bottom: 0.4rem; text-align: left; }
    .lookup-box input {
      width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: "DM Sans", sans-serif; font-size: 0.9rem;
      color: var(--text); outline: none; margin-bottom: 1rem; transition: border-color 0.2s;
    }
    .lookup-box input:focus { border-color: var(--red); }
    .btn-primary {
      width: 100%; padding: 0.8rem; border-radius: 8px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff; border: none; font-family: "Syne", sans-serif;
      font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

    /* TICKETS LIST */
    #tickets-view { display: none; }
    .tickets-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
    .tickets-header h2 { font-family: "Syne", sans-serif; font-weight: 800; font-size: 1.4rem; }
    .tickets-count { font-size: 0.8rem; color: var(--muted); }
    .btn-new-ticket {
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff; border: none; border-radius: 8px;
      padding: 0.6rem 1.1rem; font-family: "Syne", sans-serif;
      font-weight: 700; font-size: 0.82rem; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-new-ticket:hover { opacity: 0.88; }

    /* FILTER TABS */
    .filter-tabs { display: flex; gap: 0.5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .filter-tab {
      padding: 0.4rem 0.9rem; border-radius: 20px; border: 1.5px solid var(--border);
      background: var(--white); font-size: 0.78rem; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all 0.18s;
    }
    .filter-tab:hover { border-color: var(--red); color: var(--red); }
    .filter-tab.active { background: var(--red); border-color: var(--red); color: #fff; }

    /* TICKET CARDS */
    .ticket-card {
      background: var(--white); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.1rem 1.25rem; margin-bottom: 0.75rem;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .ticket-card:hover { border-color: var(--red); box-shadow: 0 4px 16px rgba(227,6,19,0.1); transform: translateY(-1px); }
    .ticket-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; margin-bottom: 0.6rem; }
    .ticket-subject { font-weight: 600; font-size: 0.9rem; color: var(--text); flex: 1; line-height: 1.4; }
    .ticket-id { font-size: 0.72rem; color: var(--muted); white-space: nowrap; margin-top: 2px; }
    .ticket-meta { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .ticket-status {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700;
    }
    .status-open    { background: #eff6ff; color: #1d4ed8; }
    .status-pending { background: #fffbeb; color: #92400e; }
    .status-resolved{ background: #f0fdf4; color: #166534; }
    .status-closed  { background: #f3f4f6; color: #6b7280; }
    .ticket-date { font-size: 0.72rem; color: var(--muted); }
    .ticket-priority {
      font-size: 0.68rem; font-weight: 700; padding: 0.15rem 0.5rem;
      border-radius: 10px;
    }
    .priority-low    { background: #f0fdf4; color: #166534; }
    .priority-medium { background: #fffbeb; color: #92400e; }
    .priority-high   { background: #fff7ed; color: #c2410c; }
    .priority-urgent { background: #fff0f0; color: var(--red); }
    .ticket-arrow { color: var(--border); font-size: 1rem; margin-left: auto; }
    .ticket-card:hover .ticket-arrow { color: var(--red); }

    /* EMPTY STATE */
    .empty-state { text-align: center; padding: 3rem 2rem; color: var(--muted); }
    .empty-state .e-icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
    .empty-state h3 { font-family: "Syne", sans-serif; font-weight: 700; font-size: 1.1rem; color: var(--text); margin-bottom: 0.5rem; }

    /* LOADING */
    .loading { text-align: center; padding: 3rem; color: var(--muted); font-size: 0.875rem; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--red-border); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 0.75rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TICKET DETAIL / REPLY */
    #ticket-detail { display: none; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--red); font-size: 0.82rem; font-weight: 600;
      cursor: pointer; margin-bottom: 1.25rem; background: none; border: none;
      font-family: "DM Sans", sans-serif;
    }
    .back-btn:hover { opacity: 0.75; }
    .detail-card {
      background: var(--white); border-radius: 16px; border: 1px solid var(--border);
      overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06); margin-bottom: 1.25rem;
    }
    .detail-header {
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      padding: 1.25rem 1.5rem;
    }
    .detail-header h3 { color: #fff; font-family: "Syne", sans-serif; font-weight: 700; font-size: 1rem; margin-bottom: 0.5rem; }
    .detail-meta { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .detail-body { padding: 1.25rem 1.5rem; }
    .detail-desc { font-size: 0.875rem; color: var(--text); line-height: 1.7; white-space: pre-wrap; }

    /* CONVERSATIONS */
    .conv-section { margin-top: 1rem; }
    .conv-title { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); font-weight: 600; margin-bottom: 0.75rem; }
    .conv-item {
      border-left: 3px solid var(--border); padding: 0.75rem 1rem;
      margin-bottom: 0.75rem; border-radius: 0 8px 8px 0;
      background: var(--bg);
    }
    .conv-item.agent { border-left-color: var(--red); background: var(--red-light); }
    .conv-meta { display: flex; justify-content: space-between; margin-bottom: 0.4rem; }
    .conv-author { font-size: 0.75rem; font-weight: 600; color: var(--text); }
    .conv-date { font-size: 0.72rem; color: var(--muted); }
    .conv-body { font-size: 0.85rem; color: var(--text); line-height: 1.65; }

    /* REPLY BOX */
    .reply-card {
      background: var(--white); border-radius: 16px; border: 1px solid var(--border);
      overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .reply-header { background: var(--bg); padding: 0.9rem 1.25rem; border-bottom: 1px solid var(--border); font-size: 0.8rem; font-weight: 600; }
    .reply-body { padding: 1.25rem; }
    .reply-body textarea {
      width: 100%; padding: 0.75rem; border: 1.5px solid var(--border);
      border-radius: 8px; font-family: "DM Sans", sans-serif; font-size: 0.875rem;
      color: var(--text); resize: vertical; min-height: 100px; outline: none;
      transition: border-color 0.2s; background: var(--bg);
    }
    .reply-body textarea:focus { border-color: var(--red); background: var(--white); }
    .reply-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 0.75rem; }
    .reply-actions .file-hint { font-size: 0.75rem; color: var(--muted); }
    .btn-reply {
      padding: 0.65rem 1.5rem; border-radius: 8px;
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      color: #fff; border: none; font-family: "Syne", sans-serif;
      font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: opacity 0.2s;
    }
    .btn-reply:hover { opacity: 0.88; }
    .btn-reply:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
    .reply-success {
      background: #f0fdf4; border: 1px solid #86efac; border-radius: 8px;
      padding: 0.75rem 1rem; font-size: 0.82rem; color: #166534;
      margin-top: 0.75rem; display: none;
    }
  </style>
</head>
<body>

<div class="page-header">
  <div class="logo">Bosta</div>
  <div class="header-right">
    <div class="customer-email-badge" id="email-badge"></div>
    <button class="btn-logout" id="logout-btn" onclick="logout()">← Change email</button>
  </div>
</div>

<!-- EMAIL LOOKUP -->
<div class="container">
  <div id="email-lookup">
    <h2>My Support Tickets</h2>
    <p>Enter your email to view and reply to your tickets</p>
    <div class="lookup-box">
      <label>Email Address</label>
      <input type="email" id="lookup-email" placeholder="ahmed@bosta.co" onkeydown="if(event.key==='Enter')lookupTickets()"/>
      <button class="btn-primary" id="lookup-btn" onclick="lookupTickets()">View My Tickets →</button>
      <p id="lookup-error" style="color:var(--red);font-size:0.78rem;margin-top:0.5rem;display:none;"></p>
    </div>
  </div>

  <!-- TICKETS LIST -->
  <div id="tickets-view">
    <div class="tickets-header">
      <div>
        <h2>My Tickets</h2>
        <div class="tickets-count" id="tickets-count"></div>
      </div>
      <button class="btn-new-ticket" onclick="window.location.href='freshdesk-ticket-module.html'">+ New Ticket</button>
    </div>
    <div class="filter-tabs">
      <button class="filter-tab active" onclick="filterTickets('all',this)">All</button>
      <button class="filter-tab" onclick="filterTickets('open',this)">Open</button>
      <button class="filter-tab" onclick="filterTickets('pending',this)">Pending</button>
      <button class="filter-tab" onclick="filterTickets('resolved',this)">Resolved</button>
      <button class="filter-tab" onclick="filterTickets('closed',this)">Closed</button>
    </div>
    <div id="tickets-container"></div>
  </div>

  <!-- TICKET DETAIL -->
  <div id="ticket-detail">
    <button class="back-btn" onclick="backToList()">← Back to tickets</button>
    <div class="detail-card">
      <div class="detail-header">
        <h3 id="detail-subject"></h3>
        <div class="detail-meta" id="detail-meta"></div>
      </div>
      <div class="detail-body">
        <div class="detail-desc" id="detail-desc"></div>
        <div class="conv-section" id="conv-section" style="display:none;">
          <div class="conv-title">Conversation</div>
          <div id="conv-list"></div>
        </div>
      </div>
    </div>

    <div class="reply-card">
      <div class="reply-header">💬 Reply to this ticket</div>
      <div class="reply-body">
        <textarea id="reply-text" placeholder="Type your reply here..."></textarea>
        <div class="reply-actions">
          <span class="reply-hint" style="font-size:0.75rem;color:var(--muted);">Your reply will be sent to the support team</span>
          <button class="btn-reply" id="reply-btn" onclick="submitReply()">Send Reply →</button>
        </div>
        <div class="reply-success" id="reply-success">✅ Reply sent successfully! Our team will get back to you shortly.</div>
      </div>
    </div>
  </div>
</div>

<script>
  var FD_DOMAIN  = 'bosta1922.freshdesk.com';
  var FD_API_KEY = '8J5yIp7b9X5edw8piaIr';
  var FD_AUTH    = 'Basic ' + btoa(FD_API_KEY + ':X');

  var currentEmail   = '';
  var allTickets     = [];
  var currentTicket  = null;
  var currentFilter  = 'all';

  var STATUS_MAP = { 2:'open', 3:'pending', 4:'resolved', 5:'closed' };
  var STATUS_LABEL = { 2:'Open', 3:'Pending', 4:'Resolved', 5:'Closed' };
  var PRIORITY_MAP = { 1:'low', 2:'medium', 3:'high', 4:'urgent' };
  var PRIORITY_LABEL = { 1:'🟢 Low', 2:'🟡 Medium', 3:'🟠 High', 4:'🔴 Urgent' };

  /* ── LOOKUP ── */
  function lookupTickets() {
    var email = document.getElementById('lookup-email').value.trim();
    var errEl = document.getElementById('lookup-error');
    if (!email || !email.includes('@')) {
      errEl.textContent = 'Please enter a valid email address.';
      errEl.style.display = 'block'; return;
    }
    errEl.style.display = 'none';
    currentEmail = email;

    var btn = document.getElementById('lookup-btn');
    btn.disabled = true; btn.textContent = 'Loading…';

    document.getElementById('tickets-container').innerHTML =
      '<div class="loading"><div class="spinner"></div><br>Fetching your tickets…</div>';

    fetch('https://' + FD_DOMAIN + '/api/v2/tickets?email=' + encodeURIComponent(email) + '&include=requester&per_page=50&order_by=created_at&order_type=desc', {
      headers: { 'Authorization': FD_AUTH }
    })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      allTickets = data;
      document.getElementById('email-lookup').style.display = 'none';
      document.getElementById('tickets-view').style.display = 'block';
      document.getElementById('email-badge').textContent = email;
      document.getElementById('email-badge').style.display = 'inline-block';
      document.getElementById('logout-btn').style.display = 'inline-block';
      renderTickets(allTickets);
      btn.disabled = false; btn.textContent = 'View My Tickets →';
    })
    .catch(function(e) {
      errEl.textContent = 'Could not fetch tickets. Please check your email and try again.';
      errEl.style.display = 'block';
      document.getElementById('tickets-container').innerHTML = '';
      btn.disabled = false; btn.textContent = 'View My Tickets →';
    });
  }

  /* ── RENDER TICKETS ── */
  function renderTickets(tickets) {
    var container = document.getElementById('tickets-container');
    var filtered = currentFilter === 'all' ? tickets :
      tickets.filter(function(t) { return STATUS_MAP[t.status] === currentFilter; });

    document.getElementById('tickets-count').textContent =
      filtered.length + ' ticket' + (filtered.length !== 1 ? 's' : '');

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state"><span class="e-icon">🎫</span>' +
        '<h3>No tickets found</h3><p>No ' + (currentFilter !== 'all' ? currentFilter + ' ' : '') +
        'tickets found for ' + currentEmail + '</p></div>';
      return;
    }

    container.innerHTML = filtered.map(function(t) {
      var statusKey = STATUS_MAP[t.status] || 'open';
      var date = new Date(t.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
      return '<div class="ticket-card" onclick="openTicket(' + t.id + ')">' +
        '<div class="ticket-card-top">' +
          '<div>' +
            '<div class="ticket-subject">' + escHtml(t.subject) + '</div>' +
            '<div class="ticket-id">#' + t.id + '</div>' +
          '</div>' +
          '<span class="ticket-arrow">›</span>' +
        '</div>' +
        '<div class="ticket-meta">' +
          '<span class="ticket-status status-' + statusKey + '">' + STATUS_LABEL[t.status] + '</span>' +
          '<span class="ticket-priority priority-' + PRIORITY_MAP[t.priority] + '">' + PRIORITY_LABEL[t.priority] + '</span>' +
          '<span class="ticket-date">Created ' + date + '</span>' +
        '</div>' +
      '</div>';
    }).join('');
  }

  /* ── FILTER ── */
  function filterTickets(filter, el) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(function(b) { b.classList.remove('active'); });
    el.classList.add('active');
    renderTickets(allTickets);
  }

  /* ── OPEN TICKET ── */
  function openTicket(id) {
    document.getElementById('tickets-view').style.display = 'none';
    document.getElementById('ticket-detail').style.display = 'block';
    document.getElementById('detail-subject').textContent = 'Loading…';
    document.getElementById('detail-meta').innerHTML = '';
    document.getElementById('detail-desc').textContent = '';
    document.getElementById('conv-section').style.display = 'none';
    document.getElementById('reply-success').style.display = 'none';
    document.getElementById('reply-text').value = '';

    /* Fetch ticket details */
    fetch('https://' + FD_DOMAIN + '/api/v2/tickets/' + id + '?include=conversations', {
      headers: { 'Authorization': FD_AUTH }
    })
    .then(function(r) { return r.json(); })
    .then(function(t) {
      currentTicket = t;
      var statusKey = STATUS_MAP[t.status] || 'open';
      var date = new Date(t.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

      document.getElementById('detail-subject').textContent = t.subject;
      document.getElementById('detail-meta').innerHTML =
        '<span class="ticket-status status-' + statusKey + '">' + STATUS_LABEL[t.status] + '</span>' +
        '<span class="ticket-priority priority-' + PRIORITY_MAP[t.priority] + '">' + PRIORITY_LABEL[t.priority] + '</span>' +
        '<span style="color:rgba(255,255,255,0.7);font-size:0.72rem;">Ticket #' + t.id + ' · ' + date + '</span>';

      document.getElementById('detail-desc').textContent = stripHtml(t.description_text || t.description || '');

      /* Render conversations */
      if (t.conversations && t.conversations.length > 0) {
        var convHtml = t.conversations.map(function(c) {
          var isAgent = !c.incoming;
          var convDate = new Date(c.created_at).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
          return '<div class="conv-item' + (isAgent ? ' agent' : '') + '">' +
            '<div class="conv-meta">' +
              '<span class="conv-author">' + (isAgent ? '🎧 Support Agent' : '👤 You') + '</span>' +
              '<span class="conv-date">' + convDate + '</span>' +
            '</div>' +
            '<div class="conv-body">' + escHtml(stripHtml(c.body_text || c.body || '')) + '</div>' +
          '</div>';
        }).join('');
        document.getElementById('conv-list').innerHTML = convHtml;
        document.getElementById('conv-section').style.display = 'block';
      }

      /* Disable reply if closed */
      var replyBtn = document.getElementById('reply-btn');
      var replyTxt = document.getElementById('reply-text');
      if (t.status === 5) {
        replyBtn.disabled = true;
        replyTxt.disabled = true;
        replyTxt.placeholder = 'This ticket is closed. Please open a new ticket if you need further help.';
      } else {
        replyBtn.disabled = false;
        replyTxt.disabled = false;
        replyTxt.placeholder = 'Type your reply here...';
      }
    })
    .catch(function(e) {
      document.getElementById('detail-subject').textContent = 'Could not load ticket.';
    });
  }

  /* ── SUBMIT REPLY ── */
  function submitReply() {
    var text = document.getElementById('reply-text').value.trim();
    if (!text) return;

    var btn = document.getElementById('reply-btn');
    btn.disabled = true; btn.textContent = 'Sending…';

    fetch('https://' + FD_DOMAIN + '/api/v2/tickets/' + currentTicket.id + '/reply', {
      method: 'POST',
      headers: { 'Authorization': FD_AUTH, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        body: text,
        user_id: currentTicket.requester_id
      })
    })
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function() {
      document.getElementById('reply-success').style.display = 'block';
      document.getElementById('reply-text').value = '';
      btn.disabled = false; btn.textContent = 'Send Reply →';
      /* Reload ticket to show new reply */
      setTimeout(function() { openTicket(currentTicket.id); }, 1500);
    })
    .catch(function(e) {
      alert('Failed to send reply. Please try again.');
      btn.disabled = false; btn.textContent = 'Send Reply →';
    });
  }

  /* ── NAVIGATION ── */
  function backToList() {
    document.getElementById('ticket-detail').style.display = 'none';
    document.getElementById('tickets-view').style.display = 'block';
  }

  function logout() {
    currentEmail = ''; allTickets = []; currentTicket = null;
    document.getElementById('tickets-view').style.display = 'none';
    document.getElementById('ticket-detail').style.display = 'none';
    document.getElementById('email-lookup').style.display = 'block';
    document.getElementById('lookup-email').value = '';
    document.getElementById('email-badge').style.display = 'none';
    document.getElementById('logout-btn').style.display = 'none';
  }

  /* ── HELPERS ── */
  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function stripHtml(html) {
    var tmp = document.createElement('div');
    tmp.innerHTML = html;
